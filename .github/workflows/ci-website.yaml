name: "Continuous Integration (website)"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'website/**'
  push:
    branches:
      - main
    paths: 
      - 'website/**'

permissions:
  contents: read

defaults:
  run:
    shell: bash
    working-directory: website/

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🇳 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: ⚒️ Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.40.0"            

      - name: ⚙️ Install dependencies
        run: just ci

      - name: 🔍 Check lints and formatting
        run: just check

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🇳 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: ⚒️ Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.40.0"

      - name: ⚙️ Install dependencies
        run: just ci

      - name: 🧪 Run tests
        run: just test

      - name: ⬆️ Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-coverage
          path: website/coverage/

  build:
    needs: [test, check]
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🇳 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: ⚒️ Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.40.0"            

      - name: ⚙️ Install dependencies
        run: just ci

      - name: 🏗️ Build production output
        run: just build

      - name: ⬆️ Upload static website artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: website-${{ github.sha }}
          path: website/dist/website/

  test-e2e:
    name: Test E2E (${{ matrix.browser }})
    runs-on: ubuntu-24.04
    needs: build
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:9bd26ad900bb5e0f4dee75839e957a89ae89c2b7ab1e76050e559790e946b948
    strategy:
      fail-fast: false
      matrix:
        browser:
          [
            chromium,
            firefox,
            webkit,
            mobile-chrome,
            mobile-safari,
            microsoft-edge,
            google-chrome,
          ]
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: 🇳 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.16.0"
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: ⚒️ Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4
        with:
          just-version: "1.40.0"

      - name: ⚙️ Install dependencies
        run: just ci

      - name: 💾 Cache Playwright browsers
        id: cache-playwright-browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: ⚙️ Setup Microsoft Edge
        if: matrix.browser == 'microsoft-edge'
        run: npx playwright install msedge

      - name: ⚙️ Setup Google Chrome
        if: matrix.browser == 'google-chrome'
        run: npx playwright install chrome

      - name: ⬇️ Download generated distribution
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: website-${{ github.sha }}
          path: website/dist/website

      - name: 🧪 Run E2E tests
        run: just test-e2e-on ${{ matrix.browser }}
        env:
          CI: "true"
          HOME: /root

      - name: ⬆️ Upload coverage report
        if: matrix.browser == 'chromium'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-e2e-coverage-${{ matrix.browser }}
          path: website/e2e-tests-report/coverage/ui-lcov.info

  sonar:
    needs: [test, test-e2e, check]
    name: Sonar
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: ⬇️ Download test coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-coverage
          path: website/coverage/

      - name: ⬇️ Download test-e2e coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: test-e2e-coverage-chromium
          path: website/e2e-tests-report/coverage

      - name: 💾 Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-sonar

      - name: 🏷️ Get package version
        id: get_version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔍 SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1
        with:
          projectBaseDir: website
          args: >
            -Dsonar.scm.revision=${{ github.sha }}
            -Dsonar.projectVersion=${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_KAIZEN_WEBSITE }}
