name: "Continuous Integration (parser)"

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'kaizen-parser/**'
  push:
    branches:
      - main
    paths:
      - 'kaizen-parser/**'

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 🛠️ Install toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: 📦 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ✅ Check
        run: cargo check --locked --verbose
        working-directory: kaizen-parser/

      - name: ✅ Check without default features
        run: cargo check --locked --no-default-features --verbose
        working-directory: kaizen-parser/

  clippy:
    name: Lints
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          
      - name: 🛠️ Install toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: clippy
      
      - name: 📦 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: 🔍 Check the lints
        run: cargo clippy --tests --verbose -- -D warnings
        working-directory: kaizen-parser/
      
      - name: 🔍 Check the pedantic lints
        run: cargo clippy --all-targets --verbose -- -W clippy::pedantic
        working-directory: kaizen-parser/

  rustfmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          
      - name: 🛠️ Install toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: rustfmt
      
      - name: 📦 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
      - name: 📝 Check the formatting
        run: cargo fmt --all -- --check --verbose
        working-directory: kaizen-parser/

  test:
    name: Test 
    runs-on: ubuntu-24.04
    steps:
      - name: 🛡️ Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          
      - name: 🛠️ Install Rust toolchain
        uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          components: clippy

      - name: 📦 Checkout
        if: github.event_name != 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: 📦 Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: ⚙️ Setup cargo-tarpaulin
        uses: taiki-e/install-action@729782fe88a82545fe2fd596fab2f33f9f721159 # cargo-tarpaulin

      - name: 💾 Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: 🧪 Run tests 
        run: |
          cargo tarpaulin --out Lcov --all-features \
            -- --skip "repo::test::git_upstream_remote"
        working-directory: kaizen-parser/
        env:
          RUST_LOG: info

      - name: 📊 Generate clippy report
        run: cargo clippy --message-format json > clippy-report.json
        working-directory: kaizen-parser/
        env:
          RUST_LOG: info

      - name: 💾 Cache SonarCloud packages
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-sonar

      - name: 🔎 SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8
        with:
          projectBaseDir: kaizen-parser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_KAIZEN_CLI }}
